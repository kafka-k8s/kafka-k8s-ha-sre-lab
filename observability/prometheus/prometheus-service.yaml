# Prometheus ClusterIP Service.
#
# Port 9090 is the standard Prometheus HTTP port.
# Grafana uses this service as its Prometheus datasource at http://prometheus:9090.
# Alertmanager routing is from Prometheus to alertmanager:9093.
#
# Access locally: make port-forward-prometheus
# Then open: http://localhost:9090
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: kafka-lab
  labels:
    app: prometheus
    app.kubernetes.io/name: kafka-k8s-ha-sre-lab
    app.kubernetes.io/component: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      protocol: TCP
