# Grafana Deployment and Service.
#
# Grafana is deployed as a single-replica Deployment in the kafka-lab namespace.
# Data (user-saved dashboards, preferences) is stored in an emptyDir volume and
# is lost when the pod restarts. Provisioned dashboards are re-loaded from
# ConfigMaps on each restart, so the Kafka Overview dashboard is always present.
#
# Default credentials (local lab only):
#   Username: admin
#   Password: admin
#
# Production note: Use a Kubernetes Secret for GF_SECURITY_ADMIN_PASSWORD,
# a PersistentVolumeClaim for /var/lib/grafana, and consider disabling
# anonymous access. Never expose Grafana without authentication on a shared
# network.
#
# Volume mounts:
#   grafana-datasource           → /etc/grafana/provisioning/datasources/
#   grafana-dashboard-provider   → /etc/grafana/provisioning/dashboards/
#   kafka-dashboard              → /var/lib/grafana/dashboards/
#
# Access: make port-forward-grafana → http://localhost:3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: kafka-lab
  labels:
    app: grafana
    app.kubernetes.io/name: kafka-k8s-ha-sre-lab
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        app.kubernetes.io/name: kafka-k8s-ha-sre-lab
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.3
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            # Lab default password. Replace with a Secret in production.
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost:3000"
            - name: GF_LOG_LEVEL
              value: "warn"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 300m
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasource
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: kafka-dashboard
        - name: data
          emptyDir: {}
